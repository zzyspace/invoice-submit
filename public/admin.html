<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>发票信息后台</title>
    <style>
      :root {
        --bg: #f2f2f7;
        --bg-accent: #e9edf7;
        --surface: rgba(255, 255, 255, 0.84);
        --surface-strong: #ffffff;
        --line: rgba(60, 60, 67, 0.16);
        --line-strong: rgba(60, 60, 67, 0.24);
        --ink: #1c1c1e;
        --ink-soft: #6e6e73;
        --brand: #007aff;
        --brand-soft: rgba(0, 122, 255, 0.12);
        --accent: #007aff;
        --danger: #ff3b30;
        --shadow: 0 24px 60px rgba(28, 28, 30, 0.1);
        --radius-xl: 28px;
        --radius-lg: 18px;
        --radius-md: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(0, 122, 255, 0.16), transparent 28%),
          radial-gradient(circle at top right, rgba(90, 200, 250, 0.18), transparent 26%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
      }

      body.modal-open {
        overflow: hidden;
      }

      .page {
        width: min(1240px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        display: grid;
        gap: 14px;
        margin-bottom: 20px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(60, 60, 67, 0.12);
        color: var(--ink-soft);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .hero p {
        margin: 0;
        max-width: 720px;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.7;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
      }

      .controls {
        padding: 22px;
        margin-bottom: 18px;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: minmax(220px, 2fr) minmax(140px, 1fr) minmax(120px, 0.7fr) auto auto;
        gap: 12px;
        align-items: end;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 12px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .field input,
      .field select,
      button {
        min-height: 46px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        padding: 0 14px;
        font: inherit;
      }

      .field input,
      .field select {
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
      }

      .field input:focus,
      .field select:focus,
      button:focus {
        outline: 2px solid rgba(0, 122, 255, 0.28);
        outline-offset: 2px;
      }

      button {
        background: var(--surface-strong);
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
      }

      .button-primary {
        background: var(--brand);
        border-color: var(--brand);
        color: #ffffff;
      }

      .meta-row {
        margin-top: 16px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: var(--brand-soft);
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
      }

      .status {
        color: var(--ink-soft);
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .table-panel {
        overflow: hidden;
      }

      .table-scroll {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1280px;
        table-layout: fixed;
      }

      col.col-submit-id {
        width: 80px;
      }

      col.col-attachment {
        width: 180px;
      }

      col.col-note {
        width: 180px;
      }

      thead {
        background: rgba(255, 255, 255, 0.7);
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        text-align: left;
      }

      th {
        color: var(--ink-soft);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
        line-height: 1.6;
      }

      th:nth-child(5),
      td:nth-child(5),
      th:nth-child(6),
      td:nth-child(6),
      th:nth-child(7),
      td:nth-child(7),
      th:nth-child(8),
      td:nth-child(8) {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.56);
      }

      .mono {
        font-family: "SF Mono", "JetBrains Mono", "Consolas", monospace;
        font-size: 12px;
      }

      .muted {
        color: var(--ink-soft);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(0, 122, 255, 0.1);
        color: var(--brand);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .tag-type {
        min-height: 24px;
        padding: 0 9px;
        border-radius: 999px;
        font-size: 12px;
      }

      .tag-type-enterprise {
        background: rgba(0, 122, 255, 0.14);
        color: var(--brand);
      }

      .tag-type-personal {
        background: rgba(255, 149, 0, 0.16);
        color: #c96f00;
      }

      .tag-type-neutral {
        background: rgba(120, 120, 128, 0.14);
        color: var(--ink-soft);
      }

      .title-meta {
        margin-top: 8px;
      }

      .attachment-link {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .attachment-link:hover {
        text-decoration: underline;
      }

      .preview-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(28, 28, 30, 0.38);
        backdrop-filter: blur(12px);
      }

      .preview-modal[hidden] {
        display: none;
      }

      .preview-dialog {
        width: min(560px, calc(100vw - 40px));
        max-height: calc(100vh - 40px);
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 20px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.76);
      }

      .preview-header h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        word-break: break-word;
      }

      .preview-meta {
        margin-top: 6px;
        color: var(--ink-soft);
        font-size: 13px;
        line-height: 1.5;
      }

      .preview-body {
        min-height: min(68vh, 760px);
        padding: 20px;
        display: grid;
        place-items: center;
        background: rgba(242, 242, 247, 0.82);
      }

      .preview-status {
        max-width: 420px;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.7;
        text-align: center;
      }

      .preview-image {
        max-width: 100%;
        max-height: min(68vh, 760px);
        border-radius: var(--radius-lg);
        box-shadow: 0 16px 36px rgba(28, 28, 30, 0.12);
        object-fit: contain;
      }

      .preview-frame {
        width: 100%;
        height: min(68vh, 760px);
        border: 0;
        border-radius: var(--radius-lg);
        background: #ffffff;
      }

      .actions-cell {
        white-space: nowrap;
      }

      .button-danger {
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 59, 48, 0.16);
        background: rgba(255, 59, 48, 0.08);
        color: var(--danger);
        font-size: 13px;
        font-weight: 700;
      }

      .button-danger:hover:not([disabled]) {
        background: rgba(255, 59, 48, 0.14);
      }

      .empty {
        padding: 28px 18px;
        color: var(--ink-soft);
        text-align: center;
      }

      .pagination {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 18px 22px 22px;
      }

      .pagination button[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      @media (max-width: 980px) {
        .page {
          width: min(100vw - 20px, 1240px);
          padding-top: 20px;
        }

        .controls-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 640px) {
        .controls {
          padding: 18px;
        }

        .controls-grid {
          grid-template-columns: 1fr;
        }

        .pagination {
          justify-content: stretch;
        }

        .pagination button {
          flex: 1;
        }

        .preview-modal {
          padding: 12px;
        }

        .preview-dialog {
          width: calc(100vw - 24px);
          max-height: calc(100vh - 24px);
        }

        .preview-header {
          padding: 18px;
          flex-direction: column;
        }

        .preview-body {
          min-height: 56vh;
          padding: 14px;
        }

        .preview-image,
        .preview-frame {
          max-height: 56vh;
          height: 56vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <span class="eyebrow">Invoice Submit Admin</span>
        <h1>发票信息后台</h1>
        <p>查看最新开票提交记录，支持按门店和关键词筛选，并可直接预览用户上传的付款凭证。</p>
      </section>

      <section class="panel controls">
        <form id="filter-form">
          <div class="controls-grid">
            <div class="field">
              <label for="search">关键词</label>
              <input
                id="search"
                name="search"
                type="search"
                placeholder="搜索抬头、邮箱、联系方式、税号、备注"
              />
            </div>

            <div class="field">
              <label for="storeKey">门店</label>
              <select id="storeKey" name="storeKey">
                <option value="">全部</option>
                <option value="fuzzy">Fuzzy</option>
                <option value="peanut">Peanut</option>
                <option value="fuzzy_qz">Fuzzy泉州店</option>
              </select>
            </div>

            <div class="field">
              <label for="limit">每页数量</label>
              <select id="limit" name="limit">
                <option value="20">20</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
              </select>
            </div>

            <button class="button-primary" type="submit">查询</button>
            <button id="refresh-button" type="button">刷新</button>
          </div>
        </form>

        <div class="meta-row">
          <div class="summary">
            <span class="pill" id="summary-count">0 条记录</span>
            <span class="pill" id="summary-range">0 - 0</span>
          </div>
          <div class="status" id="status-text">正在加载...</div>
        </div>
      </section>

      <section class="panel table-panel">
        <div class="table-scroll">
          <table>
            <colgroup>
              <col class="col-submit-id" />
              <col />
              <col />
              <col />
              <col />
              <col />
              <col class="col-attachment" />
              <col class="col-note" />
              <col />
              <col />
            </colgroup>
            <thead>
              <tr>
                <th>提交ID</th>
                <th>提交时间</th>
                <th>门店</th>
                <th>抬头 / 类型</th>
                <th>税号</th>
                <th>邮箱</th>
                <th>附件</th>
                <th>备注</th>
                <th>联系方式</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
        <div class="empty" id="empty-state" hidden>暂无符合条件的提交记录。</div>
        <div class="pagination">
          <button id="prev-button" type="button">上一页</button>
          <button id="next-button" type="button">下一页</button>
        </div>
      </section>
    </main>

    <div class="preview-modal" id="attachment-preview-modal" hidden>
      <section
        class="panel preview-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="attachment-preview-title"
      >
        <header class="preview-header">
          <div>
            <h2 id="attachment-preview-title">附件预览</h2>
            <div class="preview-meta" id="attachment-preview-meta"></div>
          </div>
          <button id="attachment-preview-close" type="button">关闭</button>
        </header>
        <div class="preview-body">
          <div class="preview-status" id="attachment-preview-status">正在加载附件...</div>
          <img class="preview-image" id="attachment-preview-image" alt="附件预览" hidden />
          <iframe class="preview-frame" id="attachment-preview-frame" title="附件预览" hidden></iframe>
        </div>
      </section>
    </div>

    <script>
      const form = document.getElementById("filter-form");
      const refreshButton = document.getElementById("refresh-button");
      const prevButton = document.getElementById("prev-button");
      const nextButton = document.getElementById("next-button");
      const recordsBody = document.getElementById("records-body");
      const emptyState = document.getElementById("empty-state");
      const statusText = document.getElementById("status-text");
      const summaryCount = document.getElementById("summary-count");
      const summaryRange = document.getElementById("summary-range");
      const attachmentPreviewModal = document.getElementById("attachment-preview-modal");
      const attachmentPreviewTitle = document.getElementById("attachment-preview-title");
      const attachmentPreviewMeta = document.getElementById("attachment-preview-meta");
      const attachmentPreviewStatus = document.getElementById("attachment-preview-status");
      const attachmentPreviewImage = document.getElementById("attachment-preview-image");
      const attachmentPreviewFrame = document.getElementById("attachment-preview-frame");
      const attachmentPreviewClose = document.getElementById("attachment-preview-close");

      const state = {
        search: "",
        storeKey: "",
        limit: 50,
        offset: 0,
        total: 0,
        items: [],
        loading: false,
        deletingIds: new Set(),
      };
      let currentAttachmentPreviewUrl = "";
      let currentAttachmentPreviewRequestId = 0;
      let lastAttachmentPreviewTrigger = null;

      const storeLabels = {
        fuzzy: "Fuzzy",
        peanut: "Peanut",
        fuzzy_qz: "Fuzzy泉州店",
      };

      const typeLabels = {
        enterprise: "企业",
        personal: "个人",
      };

      function formatDate(value) {
        if (!value) {
          return "无";
        }

        const date = new Date(value);

        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return date.toLocaleString("zh-CN", {
          hour12: false,
        });
      }

      function formatBytes(value) {
        if (!Number.isFinite(value)) {
          return "";
        }

        if (value < 1024) {
          return `${value} B`;
        }

        if (value < 1024 * 1024) {
          return `${(value / 1024).toFixed(1)} KB`;
        }

        return `${(value / (1024 * 1024)).toFixed(1)} MB`;
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle("error", isError);
      }

      function createCell(content, className = "") {
        const cell = document.createElement("td");
        if (className) {
          cell.className = className;
        }
        if (typeof content === "string") {
          cell.textContent = content;
        } else if (content) {
          cell.appendChild(content);
        }
        return cell;
      }

      function createTag(text) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = text;
        return span;
      }

      function createTypeTag(invoiceType) {
        const span = document.createElement("span");
        const typeLabel = typeLabels[invoiceType] || invoiceType || "未知";
        const typeClass =
          invoiceType === "enterprise"
            ? "tag-type-enterprise"
            : invoiceType === "personal"
              ? "tag-type-personal"
              : "tag-type-neutral";
        span.className = `tag tag-type ${typeClass}`;
        span.textContent = typeLabel;
        return span;
      }

      function revokeAttachmentPreviewUrl() {
        if (!currentAttachmentPreviewUrl) {
          return;
        }

        URL.revokeObjectURL(currentAttachmentPreviewUrl);
        currentAttachmentPreviewUrl = "";
      }

      function resetAttachmentPreview() {
        attachmentPreviewStatus.hidden = false;
        attachmentPreviewStatus.textContent = "正在加载附件...";
        attachmentPreviewImage.hidden = true;
        attachmentPreviewFrame.hidden = true;
        attachmentPreviewImage.removeAttribute("src");
        attachmentPreviewFrame.removeAttribute("src");
        revokeAttachmentPreviewUrl();
      }

      function closeAttachmentPreview() {
        currentAttachmentPreviewRequestId += 1;
        attachmentPreviewModal.hidden = true;
        document.body.classList.remove("modal-open");
        resetAttachmentPreview();
        attachmentPreviewTitle.textContent = "附件预览";
        attachmentPreviewMeta.textContent = "";

        if (lastAttachmentPreviewTrigger) {
          lastAttachmentPreviewTrigger.focus();
          lastAttachmentPreviewTrigger = null;
        }
      }

      async function openAttachmentPreview({ url, name, contentType, metaText, trigger }) {
        if (!url) {
          return;
        }

        currentAttachmentPreviewRequestId += 1;
        const requestId = currentAttachmentPreviewRequestId;
        lastAttachmentPreviewTrigger = trigger || null;
        attachmentPreviewModal.hidden = false;
        document.body.classList.add("modal-open");
        resetAttachmentPreview();
        attachmentPreviewTitle.textContent = name || "附件预览";
        attachmentPreviewMeta.textContent = metaText || contentType || "";

        try {
          const response = await fetch(url, {
            headers: {
              Accept: contentType || "*/*",
            },
          });

          const payload = response.headers.get("content-type")?.includes("application/json")
            ? await response.clone().json().catch(() => null)
            : null;

          if (!response.ok) {
            throw new Error(payload?.error?.message || "附件加载失败，请稍后重试。");
          }

          const blob = await response.blob();

          if (requestId !== currentAttachmentPreviewRequestId) {
            return;
          }

          const resolvedContentType = (
            response.headers.get("content-type") ||
            blob.type ||
            contentType ||
            ""
          )
            .split(";")[0]
            .trim()
            .toLowerCase();

          currentAttachmentPreviewUrl = URL.createObjectURL(blob);

          if (resolvedContentType === "application/pdf") {
            attachmentPreviewFrame.src = currentAttachmentPreviewUrl;
            attachmentPreviewFrame.hidden = false;
            attachmentPreviewStatus.hidden = true;
            return;
          }

          if (resolvedContentType.startsWith("image/")) {
            attachmentPreviewImage.src = currentAttachmentPreviewUrl;
            attachmentPreviewImage.alt = name ? `${name} 预览` : "附件预览";
            attachmentPreviewImage.hidden = false;
            attachmentPreviewStatus.hidden = true;
            return;
          }

          attachmentPreviewStatus.textContent = "当前附件类型暂不支持页内预览。";
        } catch (error) {
          if (requestId !== currentAttachmentPreviewRequestId) {
            return;
          }

          attachmentPreviewStatus.textContent = error.message || "附件加载失败，请稍后重试。";
        }
      }

      function renderRows(items) {
        recordsBody.textContent = "";

        for (const item of items) {
          const row = document.createElement("tr");

          row.appendChild(
            createCell(
              item.submit_id === null || item.submit_id === undefined ? "无" : String(item.submit_id),
              "mono"
            )
          );
          row.appendChild(createCell(formatDate(item.created_at)));
          row.appendChild(createCell("", ""));
          row.lastChild.appendChild(createTag(storeLabels[item.store_key] || item.store_key || "未知"));

          const titleCell = document.createElement("td");
          const titleStrong = document.createElement("div");
          titleStrong.textContent = item.invoice_title || "无";
          const typeWrap = document.createElement("div");
          typeWrap.className = "title-meta";
          typeWrap.appendChild(createTypeTag(item.invoice_type));
          titleCell.append(titleStrong, typeWrap);
          row.appendChild(titleCell);

          row.appendChild(createCell(item.tax_number || "无"));
          row.appendChild(createCell(item.email || "无"));

          const attachmentCell = document.createElement("td");
          const attachmentLink = document.createElement("a");
          attachmentLink.className = "attachment-link";
          attachmentLink.href = `/api/admin/submissions/${encodeURIComponent(item.id)}/attachment`;
          attachmentLink.dataset.action = "preview-attachment";
          attachmentLink.dataset.contentType = item.attachment_content_type || "";
          attachmentLink.dataset.attachmentName = item.attachment_name || "查看附件";
          attachmentLink.textContent = item.attachment_name || "查看附件";
          const attachmentMeta = document.createElement("div");
          attachmentMeta.className = "muted";
          attachmentMeta.textContent = [
            item.attachment_content_type || "",
            formatBytes(item.attachment_size_bytes),
          ]
            .filter(Boolean)
            .join(" · ");
          attachmentLink.dataset.attachmentMeta = attachmentMeta.textContent;
          attachmentCell.append(attachmentLink, attachmentMeta);
          row.appendChild(attachmentCell);

          row.appendChild(createCell(item.note || "无"));
          row.appendChild(createCell(item.contact || "无"));

          const actionsCell = document.createElement("td");
          actionsCell.className = "actions-cell";
          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "button-danger";
          deleteButton.dataset.action = "delete";
          deleteButton.dataset.submissionId = item.id || "";
          deleteButton.disabled = state.loading || state.deletingIds.has(item.id);
          deleteButton.textContent = state.deletingIds.has(item.id) ? "删除中..." : "删除";
          actionsCell.appendChild(deleteButton);
          row.appendChild(actionsCell);

          recordsBody.appendChild(row);
        }
      }

      function updateSummary() {
        const start = state.total === 0 ? 0 : state.offset + 1;
        const end = state.offset + state.items.length;

        summaryCount.textContent = `${state.total} 条记录`;
        summaryRange.textContent = `${start} - ${end}`;
        prevButton.disabled = state.loading || state.offset === 0;
        nextButton.disabled = state.loading || end >= state.total;
        emptyState.hidden = state.items.length > 0;
      }

      async function loadRecords() {
        state.loading = true;
        prevButton.disabled = true;
        nextButton.disabled = true;
        setStatus("正在加载...");

        const query = new URLSearchParams({
          search: state.search,
          storeKey: state.storeKey,
          limit: String(state.limit),
          offset: String(state.offset),
        });

        try {
          const response = await fetch(`/api/admin/submissions?${query.toString()}`, {
            headers: {
              Accept: "application/json",
            },
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok || !payload.success) {
            throw new Error(payload?.error?.message || "加载失败");
          }

          state.total = payload.total || 0;
          state.items = Array.isArray(payload.items) ? payload.items : [];
          renderRows(state.items);
          updateSummary();

          if (state.total === 0) {
            setStatus("当前没有符合条件的记录。");
          } else {
            setStatus(`已加载 ${state.items.length} 条记录。`);
          }
        } catch (error) {
          state.items = [];
          state.total = 0;
          renderRows([]);
          updateSummary();
          setStatus(error.message || "加载失败，请稍后重试。", true);
        } finally {
          state.loading = false;
          renderRows(state.items);
          updateSummary();
        }
      }

      async function deleteSubmission(submissionId) {
        const item = state.items.find((entry) => entry.id === submissionId);

        if (!item) {
          return;
        }

        const confirmed = window.confirm(
          `确认删除这条提交记录？\n\n抬头：${item.invoice_title || "无"}\n邮箱：${item.email || "无"}`
        );

        if (!confirmed) {
          return;
        }

        state.deletingIds.add(submissionId);
        renderRows(state.items);
        updateSummary();
        setStatus(`正在删除 ${item.invoice_title || submissionId} ...`);

        try {
          const response = await fetch(`/api/admin/submissions/${encodeURIComponent(submissionId)}`, {
            method: "DELETE",
            headers: {
              Accept: "application/json",
            },
          });

          const payload = await response.json().catch(() => ({}));

          if (!response.ok || !payload.success) {
            throw new Error(payload?.error?.message || "删除失败");
          }

          if (state.items.length === 1 && state.offset > 0) {
            state.offset = Math.max(0, state.offset - state.limit);
          }

          setStatus("删除成功，正在刷新列表...");
          await loadRecords();
        } catch (error) {
          setStatus(error.message || "删除失败，请稍后重试。", true);
        } finally {
          state.deletingIds.delete(submissionId);
          renderRows(state.items);
          updateSummary();
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        state.search = String(formData.get("search") || "").trim();
        state.storeKey = String(formData.get("storeKey") || "");
        state.limit = Number.parseInt(String(formData.get("limit") || "50"), 10) || 50;
        state.offset = 0;
        loadRecords();
      });

      refreshButton.addEventListener("click", () => {
        loadRecords();
      });

      prevButton.addEventListener("click", () => {
        state.offset = Math.max(0, state.offset - state.limit);
        loadRecords();
      });

      nextButton.addEventListener("click", () => {
        state.offset += state.limit;
        loadRecords();
      });

      recordsBody.addEventListener("click", (event) => {
        const attachmentLink = event.target.closest('a[data-action="preview-attachment"]');

        if (attachmentLink) {
          event.preventDefault();
          openAttachmentPreview({
            url: attachmentLink.href,
            name: attachmentLink.dataset.attachmentName || attachmentLink.textContent || "附件预览",
            contentType: attachmentLink.dataset.contentType || "",
            metaText: attachmentLink.dataset.attachmentMeta || "",
            trigger: attachmentLink,
          });
          return;
        }

        const button = event.target.closest('button[data-action="delete"]');

        if (!button || button.disabled) {
          return;
        }

        deleteSubmission(button.dataset.submissionId || "");
      });

      attachmentPreviewClose.addEventListener("click", () => {
        closeAttachmentPreview();
      });

      attachmentPreviewModal.addEventListener("click", (event) => {
        if (event.target === attachmentPreviewModal) {
          closeAttachmentPreview();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !attachmentPreviewModal.hidden) {
          closeAttachmentPreview();
        }
      });

      loadRecords();
    </script>
  </body>
</html>
