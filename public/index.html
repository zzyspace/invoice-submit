<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <title>开票信息提交</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f1ec;
        --bg-accent: #eceae4;
        --ink: #171917;
        --ink-soft: #6b716c;
        --surface: #ffffff;
        --surface-strong: #ffffff;
        --phone-bg: rgba(255, 255, 255, 0.98);
        --phone-border: rgba(23, 25, 23, 0.06);
        --phone-shadow: 0 24px 64px rgba(24, 26, 24, 0.09);
        --line: rgba(23, 25, 23, 0.08);
        --line-strong: rgba(23, 25, 23, 0.14);
        --brand: #24362f;
        --brand-2: #8c938f;
        --brand-3: #dde0da;
        --success: #2d4a3f;
        --shadow: 0 18px 40px rgba(27, 29, 27, 0.08);
        --badge-bg: #f3f5f2;
        --pill-bg: #f4f5f2;
        --pill-soft-bg: #f5f5f2;
        --accent-pill-bg: #fff0e9;
        --accent-pill-border: #f0c3af;
        --accent-pill-ink: #9f492a;
        --danger-ink: #7a3b28;
        --segment-bg: #f6f6f3;
        --segment-active-bg: #ffffff;
        --focus-ring: rgba(36, 54, 47, 0.28);
        --focus-ring-soft: rgba(36, 54, 47, 0.18);
        --input-bg: #fafaf7;
        --input-border: rgba(23, 25, 23, 0.07);
        --placeholder: rgba(23, 25, 23, 0.42);
        --upload-border: rgba(23, 25, 23, 0.18);
        --upload-bg: #f7f7f4;
        --upload-filled-bg: #ffffff;
        --upload-plus-bg: #ffffff;
        --upload-plus-border: rgba(23, 25, 23, 0.06);
        --cta-bg: #007aff;
        --cta-ink: #ffffff;
        --feedback-error-bg: #fff2ed;
        --feedback-error-border: #f1cbbb;
        --feedback-error-ink: #9f492a;
        --feedback-success-bg: #edf7f0;
        --feedback-success-border: #c7dfce;
        --feedback-success-ink: #2d4a3f;
        --radius-xl: 26px;
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 10px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0b0b0f;
          --bg-accent: #14151a;
          --ink: #ffffff;
          --ink-soft: #98989f;
          --surface: #1c1c1e;
          --surface-strong: #1c1c1e;
          --phone-bg: rgba(10, 10, 12, 0.96);
          --phone-border: rgba(84, 84, 88, 0.5);
          --phone-shadow: 0 28px 72px rgba(0, 0, 0, 0.48);
          --line: rgba(84, 84, 88, 0.45);
          --line-strong: rgba(84, 84, 88, 0.78);
          --brand: #0a84ff;
          --brand-2: #8e8e93;
          --brand-3: #2c2c2e;
          --success: #64d2ff;
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
          --badge-bg: #2c2c2e;
          --pill-bg: #2c2c2e;
          --pill-soft-bg: #2c2c2e;
          --accent-pill-bg: rgba(255, 159, 10, 0.18);
          --accent-pill-border: rgba(255, 159, 10, 0.28);
          --accent-pill-ink: #ffb340;
          --danger-ink: #ffb340;
          --segment-bg: #2c2c2e;
          --segment-active-bg: #3a3a3c;
          --focus-ring: rgba(10, 132, 255, 0.52);
          --focus-ring-soft: rgba(10, 132, 255, 0.34);
          --input-bg: #2c2c2e;
          --input-border: rgba(84, 84, 88, 0.58);
          --placeholder: rgba(235, 235, 245, 0.3);
          --upload-border: rgba(84, 84, 88, 0.72);
          --upload-bg: #2c2c2e;
          --upload-filled-bg: #3a3a3c;
          --upload-plus-bg: #3a3a3c;
          --upload-plus-border: rgba(255, 255, 255, 0.08);
          --cta-bg: #0a84ff;
          --cta-ink: #ffffff;
          --feedback-error-bg: rgba(159, 73, 42, 0.16);
          --feedback-error-border: rgba(241, 203, 187, 0.22);
          --feedback-error-ink: #f2baa2;
          --feedback-success-bg: rgba(10, 132, 255, 0.2);
          --feedback-success-border: rgba(100, 210, 255, 0.2);
          --feedback-success-ink: #9ddcff;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
        color: var(--ink);
      }

      body.has-modal {
        overflow: hidden;
      }

      .stage {
        width: 100%;
        min-height: 100vh;
        padding: 48px 24px;
        display: grid;
        place-items: center;
      }

      .phone {
        width: 430px;
        border-radius: 34px;
        background: var(--phone-bg);
        border: 1px solid var(--phone-border);
        box-shadow: var(--phone-shadow);
        overflow: hidden;
      }

      .screen {
        padding: 20px 20px 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .form-stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .hero {
        padding: 48px 2px 12px;
        border-bottom: 1px solid var(--line);
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: 32px;
        line-height: 1.04;
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        max-width: none;
        font-size: 14px;
        line-height: 1.68;
        color: var(--ink-soft);
      }

      .section-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        padding: 18px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-title-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .badge-num {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        flex: none;
        background: var(--badge-bg);
        color: var(--brand);
        font-weight: 600;
        font-size: 12px;
      }

      .section-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .section-subtitle {
        margin-top: 4px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 11px;
        border-radius: 999px;
        background: var(--pill-bg);
        color: var(--ink-soft);
        font-size: 11px;
        font-weight: 600;
      }

      .tag-required {
        width: 40px;
        height: 25px;
        padding: 0;
        justify-content: center;
        flex: none;
        background: var(--accent-pill-bg);
        border: 1px solid var(--accent-pill-border);
        color: var(--accent-pill-ink);
      }

      .section-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tag-inline-required {
        height: 24px;
        padding: 0 8px;
        justify-content: center;
        flex: none;
        background: var(--accent-pill-bg);
        border: 1px solid var(--accent-pill-border);
        color: var(--accent-pill-ink);
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 16px;
      }

      .segmented button {
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
        text-align: left;
        background: var(--segment-bg);
        color: var(--ink);
      }

      .segmented button strong {
        display: block;
        font-size: 15px;
        margin-bottom: 0;
      }

      .segmented .active {
        background: var(--segment-active-bg);
        border-color: var(--line-strong);
      }

      .segmented button:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 2px;
      }

      .field-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .field {
        padding: 14px 14px 16px;
        border-radius: 20px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
      }

      .field-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .label-group {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .field label {
        font-size: 14px;
        font-weight: 600;
      }

      .required {
        color: var(--danger-ink);
      }

      .optional {
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--pill-soft-bg);
        color: var(--ink-soft);
        font-size: 11px;
      }

      .helper {
        margin-bottom: 10px;
        font-size: 12px;
        line-height: 1.55;
        color: var(--ink-soft);
      }

      .input-shell {
        width: 100%;
        height: 50px;
        padding: 0 14px;
        border-radius: 14px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        color: var(--ink);
        font-size: 15px;
        font-family: inherit;
        appearance: none;
      }

      .input-shell::placeholder {
        color: var(--placeholder);
      }

      .input-shell:focus {
        outline: 2px solid var(--focus-ring-soft);
        outline-offset: 2px;
      }

      .textarea-shell {
        min-height: 104px;
        height: auto;
        padding-top: 14px;
        padding-bottom: 14px;
        resize: vertical;
        line-height: 1.65;
      }

      .upload-shell {
        display: block;
      }

      .upload-dropzone {
        display: block;
        width: 100%;
        position: relative;
        height: 120px;
        border-radius: 18px;
        border: 1px dashed var(--upload-border);
        background: var(--upload-bg);
        color: var(--brand);
        cursor: pointer;
        overflow: hidden;
      }

      .upload-dropzone.is-filled {
        border-style: solid;
        background: var(--upload-filled-bg);
      }

      .upload-placeholder {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 16px;
      }

      .upload-dropzone .plus {
        width: 36px;
        height: 36px;
        margin: 0 auto 8px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: var(--upload-plus-bg);
        border: 1px solid var(--upload-plus-border);
        font-size: 24px;
        line-height: 1;
      }

      .upload-title {
        font-size: 14px;
        font-weight: 700;
      }

      .upload-meta {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.5;
        color: var(--ink-soft);
        word-break: break-all;
      }

      .upload-preview[hidden],
      .upload-placeholder[hidden] {
        display: none;
      }

      .upload-preview {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72) 0%, rgba(244, 246, 242, 0.92) 100%),
          repeating-linear-gradient(
            45deg,
            rgba(36, 54, 47, 0.04) 0,
            rgba(36, 54, 47, 0.04) 10px,
            rgba(255, 255, 255, 0.36) 10px,
            rgba(255, 255, 255, 0.36) 20px
          );
      }

      .upload-preview-media {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        display: block;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        box-shadow: 0 12px 24px rgba(23, 25, 23, 0.08);
        pointer-events: none;
      }

      .upload-preview-image-fallback[hidden] {
        display: none;
      }

      .upload-preview-image-fallback {
        position: absolute;
        inset: 8px;
        display: grid;
        place-items: center;
        gap: 10px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink-soft);
        text-align: center;
        pointer-events: none;
      }

      .upload-preview-image-fallback__icon {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
        color: var(--brand);
        font-size: 16px;
        font-weight: 800;
      }

      .upload-preview-image-fallback__text {
        font-size: 13px;
        line-height: 1.5;
      }

      .upload-preview-document {
        width: 82px;
        height: 96px;
        position: relative;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(244, 246, 242, 0.94) 100%);
        box-shadow: 0 14px 24px rgba(23, 25, 23, 0.12);
        overflow: hidden;
        pointer-events: none;
      }

      .upload-preview-document::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 22px;
        height: 22px;
        background: linear-gradient(135deg, rgba(221, 224, 218, 0.9) 0%, rgba(255, 255, 255, 0.98) 100%);
        clip-path: polygon(0 0, 100% 0, 100% 100%);
      }

      .upload-preview-document__page {
        padding: 16px 14px 14px;
      }

      .upload-preview-document__band {
        width: 44px;
        height: 8px;
        border-radius: 999px;
        background: rgba(36, 54, 47, 0.14);
        margin-bottom: 12px;
      }

      .upload-preview-document__line {
        height: 6px;
        border-radius: 999px;
        background: rgba(36, 54, 47, 0.12);
        margin-bottom: 8px;
      }

      .upload-preview-document__line:last-child {
        width: 70%;
        margin-bottom: 0;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
        white-space: nowrap;
      }

      .footer-card {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
      }

      .cta {
        height: 56px;
        width: 100%;
        border: 0;
        border-radius: 18px;
        font: inherit;
        font-size: 16px;
        font-weight: 700;
        color: var(--cta-ink);
        background: var(--cta-bg);
      }

      .cta:disabled {
        opacity: 0.72;
        cursor: wait;
      }

      .cta-row {
        display: block;
      }

      .form-feedback {
        margin: 2px 0 4px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.6;
      }

      .form-feedback[data-variant="error"] {
        background: var(--feedback-error-bg);
        border: 1px solid var(--feedback-error-border);
        color: var(--feedback-error-ink);
      }

      .form-feedback[data-variant="success"] {
        background: var(--feedback-success-bg);
        border: 1px solid var(--feedback-success-border);
        color: var(--feedback-success-ink);
      }

      .success-modal[hidden] {
        display: none;
      }

      .success-modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .success-modal__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(18, 20, 18, 0.42);
        backdrop-filter: blur(8px);
      }

      .success-modal__panel {
        position: relative;
        width: min(100%, 360px);
        padding: 24px 20px 20px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        box-shadow: var(--phone-shadow);
      }

      .success-modal__title {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }

      .success-modal__message {
        margin: 0;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.7;
      }

      .success-modal__actions {
        margin-top: 20px;
      }

      @media (max-width: 520px) {
        .stage {
          padding: 0;
        }

        .phone {
          width: 100%;
          min-height: 100vh;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="phone">
        <div class="screen">
          <section class="hero">
            <div>
              <h1>开票信息</h1>
              <p>请填写开票信息，我们将会在2个工作日内将电子发票发送到指定邮箱。若2个工作日内没有收到，请检查垃圾邮件或联系门店，我们会为您及时处理。</p>
            </div>
          </section>

          <form id="invoice-form" class="form-stack" novalidate enctype="multipart/form-data">
            <input id="invoice-type" name="invoiceType" type="hidden" value="enterprise" />
            <input id="store-key" name="storeKey" type="hidden" value="" />

            <section class="section-card">
              <div class="section-header">
                <div class="section-title-wrap">
                  <div class="badge-num">01</div>
                  <div>
                    <div class="section-title">开票主体</div>
                    <div class="section-subtitle">先确认是企业还是个人，再填写主体信息。</div>
                  </div>
                </div>
              </div>

              <div class="segmented" role="group" aria-label="开票主体类型">
                <button class="active" type="button" data-invoice-type="enterprise" aria-pressed="true">
                  <strong>企业</strong>
                </button>
                <button type="button" data-invoice-type="personal" aria-pressed="false">
                  <strong>个人</strong>
                </button>
              </div>

              <div class="field-grid">
                <div class="field">
                  <div class="field-top">
                    <div class="label-group">
                      <label for="invoice-title">发票抬头</label>
                      <span class="tag tag-inline-required">必填</span>
                    </div>
                  </div>
                  <input
                    id="invoice-title"
                    class="input-shell"
                    name="invoiceTitle"
                    type="text"
                    autocomplete="organization"
                    maxlength="120"
                    placeholder="请输入公司名称或个人姓名"
                    required
                  />
                </div>

                <div class="field">
                  <div class="field-top">
                    <div class="label-group">
                      <label for="tax-number">税号</label>
                      <span class="optional">选填</span>
                    </div>
                  </div>
                  <div class="helper">若选择个人开票，可暂不填写；企业开票建议录入统一社会信用代码。</div>
                  <input
                    id="tax-number"
                    class="input-shell"
                    name="taxNumber"
                    type="text"
                    inputmode="text"
                    maxlength="64"
                    placeholder="请输入纳税人识别号"
                  />
                </div>
              </div>
            </section>

            <section class="section-card">
              <div class="section-header">
                <div class="section-title-wrap">
                  <div class="badge-num">02</div>
                  <div>
                    <div class="section-title">接收信息</div>
                    <div class="section-subtitle">请填写邮箱用于接收电子发票</div>
                  </div>
                </div>
              </div>

              <div class="field-grid">
                <div class="field">
                  <div class="field-top">
                    <div class="label-group">
                      <label for="email">邮箱</label>
                      <span class="tag tag-inline-required">必填</span>
                    </div>
                  </div>
                  <input
                    id="email"
                    class="input-shell"
                    name="email"
                    type="email"
                    autocomplete="email"
                    maxlength="160"
                    placeholder="finance@company.com"
                    required
                  />
                </div>

                <div class="field">
                  <div class="field-top">
                    <div class="label-group">
                      <label for="contact">联系方式</label>
                      <span class="optional">选填</span>
                    </div>
                  </div>
                  <input
                    id="contact"
                    class="input-shell"
                    name="contact"
                    type="text"
                    autocomplete="tel"
                    maxlength="64"
                    placeholder="选填手机号码，便于异常情况联系"
                  />
                </div>
              </div>
            </section>

            <section class="section-card">
              <div class="section-header">
                <div class="section-title-wrap">
                  <div class="badge-num">03</div>
                  <div>
                    <div class="section-title-row">
                      <div class="section-title">付款凭证</div>
                      <span class="tag tag-required">必填</span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="upload-shell">
                <label class="upload-dropzone" id="attachment-dropzone" for="attachment">
                  <div class="upload-placeholder" id="attachment-placeholder">
                    <div class="plus" aria-hidden="true">+</div>
                    <div class="upload-title" id="upload-title">上传文件</div>
                    <div class="upload-meta" id="upload-meta" hidden></div>
                  </div>
                  <div class="upload-preview" id="attachment-preview" hidden aria-hidden="true">
                    <img id="attachment-image-preview" class="upload-preview-media" alt="" hidden />
                    <div id="attachment-image-fallback" class="upload-preview-image-fallback" hidden>
                      <div class="upload-preview-image-fallback__icon" aria-hidden="true">图</div>
                      <div id="attachment-image-fallback-text" class="upload-preview-image-fallback__text">正在生成预览</div>
                    </div>
                    <div id="attachment-document-preview" class="upload-preview-document" hidden>
                      <div class="upload-preview-document__page">
                        <div class="upload-preview-document__band"></div>
                        <div class="upload-preview-document__line"></div>
                        <div class="upload-preview-document__line"></div>
                        <div class="upload-preview-document__line"></div>
                      </div>
                    </div>
                  </div>
                </label>
                <input
                  id="attachment"
                  class="visually-hidden"
                  name="attachment"
                  type="file"
                  accept=".png,.jpg,.jpeg,.pdf,image/png,image/jpeg,application/pdf"
                  required
                />
              </div>
            </section>

            <section class="section-card">
              <div class="section-header">
                <div class="section-title-wrap">
                  <div class="badge-num">04</div>
                  <div>
                    <div class="section-title-row">
                      <div class="section-title">补充备注</div>
                      <span class="tag">选填</span>
                    </div>
                  </div>
                </div>
              </div>

              <textarea
                id="note"
                class="input-shell textarea-shell"
                name="note"
                rows="4"
                maxlength="500"
                placeholder="如果需要备注项目名称、开票内容或特殊抬头格式，可填写在这里。"
              ></textarea>
            </section>

            <p id="form-feedback" class="form-feedback" hidden role="status" aria-live="polite"></p>

            <section class="footer-card">
              <div class="cta-row">
                <button id="submit-button" class="cta" type="submit">保存并提交开票信息</button>
              </div>
            </section>
          </form>
        </div>
      </div>
    </main>
    <div id="success-modal" class="success-modal" hidden>
      <div class="success-modal__backdrop" aria-hidden="true"></div>
      <section
        class="success-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="success-modal-title"
        aria-describedby="success-modal-message"
      >
        <h2 id="success-modal-title" class="success-modal__title">提交成功</h2>
        <p id="success-modal-message" class="success-modal__message">
          我们已收到您的开票信息，发票将于1个工作日内送达您的邮箱，请注意查收。
        </p>
        <div class="success-modal__actions">
          <button id="success-modal-close-button" class="cta" type="button">关闭此页面</button>
        </div>
      </section>
    </div>
    <script>
      (() => {
        const form = document.getElementById("invoice-form");
        if (!form) return;

        const invoiceTypeInput = document.getElementById("invoice-type");
        const storeKeyInput = document.getElementById("store-key");
        const typeButtons = Array.from(document.querySelectorAll("[data-invoice-type]"));
        const invoiceTitleInput = document.getElementById("invoice-title");
        const emailInput = document.getElementById("email");
        const attachmentInput = document.getElementById("attachment");
        const attachmentDropzone = document.getElementById("attachment-dropzone");
        const attachmentPlaceholder = document.getElementById("attachment-placeholder");
        const attachmentPreview = document.getElementById("attachment-preview");
        const attachmentImagePreview = document.getElementById("attachment-image-preview");
        const attachmentImageFallback = document.getElementById("attachment-image-fallback");
        const attachmentImageFallbackText = document.getElementById("attachment-image-fallback-text");
        const attachmentDocumentPreview = document.getElementById("attachment-document-preview");
        const uploadTitle = document.getElementById("upload-title");
        const uploadMeta = document.getElementById("upload-meta");
        const submitButton = document.getElementById("submit-button");
        const feedback = document.getElementById("form-feedback");
        const successModal = document.getElementById("success-modal");
        const successModalMessage = document.getElementById("success-modal-message");
        const successModalCloseButton = document.getElementById("success-modal-close-button");
        const defaultSubmitButtonLabel = "保存并提交开票信息";
        let attachmentPreviewUrl = "";
        let attachmentPreviewRequestId = 0;

        const pathToStoreKey = new Map([
          ["/fuzzy", "fuzzy"],
          ["/fuzzy_qz", "fuzzy_qz"],
          ["/peanut", "peanut"],
        ]);
        const maxAttachmentBytes = 20 * 1024 * 1024;

        function setFeedback(message, variant) {
          if (!message) {
            feedback.hidden = true;
            feedback.textContent = "";
            feedback.removeAttribute("data-variant");
            return;
          }

          feedback.hidden = false;
          feedback.textContent = message;
          feedback.dataset.variant = variant;
        }

        function clearAttachmentPreviewUrl() {
          if (!attachmentPreviewUrl) {
            return;
          }

          if (attachmentPreviewUrl.startsWith("blob:")) {
            URL.revokeObjectURL(attachmentPreviewUrl);
          }

          attachmentPreviewUrl = "";
        }

        function resetAttachmentImagePreview() {
          attachmentImagePreview.hidden = true;
          attachmentImagePreview.removeAttribute("src");
          attachmentImagePreview.onload = null;
          attachmentImagePreview.onerror = null;
          attachmentImageFallback.hidden = true;
          attachmentImageFallbackText.textContent = "正在生成预览";
        }

        function getAttachmentKind(file) {
          if (!file) {
            return "none";
          }

          const normalizedName = typeof file.name === "string" ? file.name.toLowerCase() : "";
          const isImageFile =
            file.type === "image/png" ||
            file.type === "image/jpeg" ||
            normalizedName.endsWith(".png") ||
            normalizedName.endsWith(".jpg") ||
            normalizedName.endsWith(".jpeg");

          if (isImageFile) {
            return "image";
          }

          if (file.type === "application/pdf" || normalizedName.endsWith(".pdf")) {
            return "pdf";
          }

          return "unsupported";
        }

        function readFileAsDataUrl(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();

            reader.addEventListener("load", () => {
              resolve(typeof reader.result === "string" ? reader.result : "");
            });

            reader.addEventListener("error", () => {
              reject(reader.error || new Error("读取文件失败"));
            });

            reader.readAsDataURL(file);
          });
        }

        function waitForAttachmentImageLoad(source, requestId) {
          return new Promise((resolve) => {
            attachmentImagePreview.onload = () => {
              attachmentImagePreview.onload = null;
              attachmentImagePreview.onerror = null;
              resolve(requestId === attachmentPreviewRequestId);
            };

            attachmentImagePreview.onerror = () => {
              attachmentImagePreview.onload = null;
              attachmentImagePreview.onerror = null;
              resolve(false);
            };

            attachmentImagePreview.src = source;
          });
        }

        function normalizeRoutePath(pathname) {
          const normalized = pathname.replace(/\/+$/g, "");
          return normalized || "/";
        }

        function syncStoreKey() {
          const storeKey = pathToStoreKey.get(normalizeRoutePath(window.location.pathname)) || "";
          storeKeyInput.value = storeKey;
          return storeKey;
        }

        function setSubmitButtonState({
          disabled = false,
          label = defaultSubmitButtonLabel,
        } = {}) {
          submitButton.disabled = disabled;
          submitButton.textContent = label;
        }

        function showSuccessModal(message) {
          successModalMessage.textContent = message;
          successModal.hidden = false;
          document.body.classList.add("has-modal");
          window.requestAnimationFrame(() => {
            successModalCloseButton.focus();
          });
        }

        function setInvoiceType(value) {
          invoiceTypeInput.value = value;
          typeButtons.forEach((button) => {
            const isActive = button.dataset.invoiceType === value;
            button.classList.toggle("active", isActive);
            button.setAttribute("aria-pressed", String(isActive));
          });
        }

        function closeCurrentPage() {
          if (window.WeixinJSBridge && typeof window.WeixinJSBridge.call === "function") {
            window.WeixinJSBridge.call("closeWindow");
            return;
          }

          if (window.AlipayJSBridge && typeof window.AlipayJSBridge.call === "function") {
            window.AlipayJSBridge.call("closeWebview");
            return;
          }

          window.open("", "_self");
          window.close();

          window.setTimeout(() => {
            if (document.visibilityState === "hidden") {
              return;
            }

            showSuccessModal("已提交成功。如当前浏览器不允许直接关闭，请手动关闭此页面。");
          }, 300);
        }

        function validateAttachment(file) {
          if (!file) {
            return "请上传付款凭证。";
          }

          const attachmentKind = getAttachmentKind(file);
          if (attachmentKind === "unsupported") {
            return "仅支持 PNG、JPG、PDF 文件。";
          }

          if (file.size > maxAttachmentBytes) {
            return "附件大小不能超过 20MB。";
          }

          return "";
        }

        async function syncAttachmentUi() {
          const requestId = ++attachmentPreviewRequestId;
          const file = attachmentInput.files && attachmentInput.files[0];
          clearAttachmentPreviewUrl();

          if (!file) {
            uploadTitle.textContent = "上传文件";
            attachmentPlaceholder.hidden = false;
            attachmentPreview.hidden = true;
            resetAttachmentImagePreview();
            attachmentDocumentPreview.hidden = true;
            uploadMeta.hidden = true;
            uploadMeta.textContent = "";
            attachmentDropzone.classList.remove("is-filled");
            return;
          }

          attachmentPlaceholder.hidden = true;
          attachmentPreview.hidden = false;
          resetAttachmentImagePreview();
          attachmentDocumentPreview.hidden = true;
          uploadTitle.textContent = "上传文件";
          uploadMeta.hidden = true;
          uploadMeta.textContent = "";

          const attachmentKind = getAttachmentKind(file);

          if (attachmentKind === "pdf" || attachmentKind === "unsupported") {
            attachmentDocumentPreview.hidden = false;
            attachmentDropzone.classList.add("is-filled");
            return;
          }

          attachmentImageFallback.hidden = false;
          attachmentImageFallbackText.textContent = "正在生成预览";

          let previewSource = "";
          try {
            previewSource = await readFileAsDataUrl(file);
          } catch (error) {
            previewSource = "";
          }

          if (requestId !== attachmentPreviewRequestId) {
            return;
          }

          if (!previewSource && typeof URL.createObjectURL === "function") {
            previewSource = URL.createObjectURL(file);
          }

          if (requestId !== attachmentPreviewRequestId) {
            if (previewSource.startsWith("blob:")) {
              URL.revokeObjectURL(previewSource);
            }
            return;
          }

          if (previewSource) {
            attachmentPreviewUrl = previewSource;
            const imageLoaded = await waitForAttachmentImageLoad(previewSource, requestId);
            if (requestId !== attachmentPreviewRequestId) {
              return;
            }

            if (imageLoaded) {
              attachmentImagePreview.hidden = false;
              attachmentImageFallback.hidden = true;
            } else {
              resetAttachmentImagePreview();
              attachmentImageFallback.hidden = false;
              attachmentImageFallbackText.textContent = "图片已选中";
            }
          } else {
            attachmentImageFallback.hidden = false;
            attachmentImageFallbackText.textContent = "图片已选中";
          }

          attachmentDropzone.classList.add("is-filled");
        }

        typeButtons.forEach((button) => {
          button.addEventListener("click", () => {
            setInvoiceType(button.dataset.invoiceType);
          });
        });

        attachmentInput.addEventListener("change", () => {
          void syncAttachmentUi();
        });

        attachmentDropzone.addEventListener("dragover", (event) => {
          event.preventDefault();
        });

        attachmentDropzone.addEventListener("drop", (event) => {
          event.preventDefault();
          const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
          if (!file) return;

          const transfer = new DataTransfer();
          transfer.items.add(file);
          attachmentInput.files = transfer.files;
          attachmentInput.dispatchEvent(new Event("change"));
        });

        successModalCloseButton.addEventListener("click", () => {
          closeCurrentPage();
        });

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          setFeedback("", "");

          if (!syncStoreKey()) {
            setFeedback("当前链接无效，请使用门店提供的专属开票链接。", "error");
            return;
          }

          if (!invoiceTitleInput.value.trim()) {
            setFeedback("请填写发票抬头。", "error");
            invoiceTitleInput.focus();
            return;
          }

          if (!emailInput.value.trim()) {
            setFeedback("请填写邮箱。", "error");
            emailInput.focus();
            return;
          }

          if (!emailInput.checkValidity()) {
            setFeedback("请输入有效的邮箱地址。", "error");
            emailInput.focus();
            return;
          }

          const attachmentError = validateAttachment(attachmentInput.files && attachmentInput.files[0]);
          if (attachmentError) {
            setFeedback(attachmentError, "error");
            return;
          }

          setSubmitButtonState({
            disabled: true,
            label: "提交中...",
          });

          try {
            const response = await fetch("/api/submissions", {
              method: "POST",
              body: new FormData(form),
            });

            let payload = null;
            try {
              payload = await response.json();
            } catch (parseError) {
              payload = null;
            }

            if (!response.ok || !payload || payload.success !== true) {
              const message =
                (payload && payload.error && payload.error.message) ||
                "提交失败，请稍后重试。";
              throw new Error(message);
            }

            form.reset();
            setInvoiceType("enterprise");
            syncStoreKey();
            await syncAttachmentUi();
            showSuccessModal("我们已收到您的开票信息，发票将于1个工作日内送达您的邮箱，请注意查收。");
          } catch (error) {
            const message =
              error instanceof Error && error.message
                ? error.message
                : "提交失败，请稍后重试。";
            setFeedback(message, "error");
          } finally {
            setSubmitButtonState();
          }
        });

        setInvoiceType(invoiceTypeInput.value || "enterprise");
        if (!syncStoreKey()) {
          setSubmitButtonState({ disabled: true });
          setFeedback("当前链接无效，请使用门店提供的专属开票链接。", "error");
        }
        void syncAttachmentUi();
      })();
    </script>
  </body>
</html>
